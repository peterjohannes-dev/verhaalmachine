name: Sync woordenlijsten

on:
  schedule:
    - cron: '0 6 * * *'  # Dagelijks om 06:00 UTC (08:00 NL zomertijd)
  workflow_dispatch:       # Handmatig starten via GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync data uit Google Sheets
        run: python3 sync.py

      - name: Commit en push als er wijzigingen zijn
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet index.html && echo "Geen wijzigingen" && exit 0
          git add index.html
          git commit -m "Woordenlijsten bijgewerkt vanuit Google Sheets"
          git push
