<!DOCTYPE html>
<html lang="nl">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>De Fantasiemolen — Personage, Plek & Probleem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Merriweather:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --color-bg-start: #1a1a2e;
            --color-bg-end: #16213e;
            --color-machine: #0f1628;
            --color-machine-border: #c9a84c;
            --color-reel-bg: #faf8f5;
            --color-text-light: #f0e6d3;
            --color-text-dark: #1a1a2e;
            --color-personage: #e94560;
            --color-plek: #53d8a1;
            --color-probleem: #f5a623;
            --color-spin-start: #e94560;
            --color-spin-end: #ff6b8a;
            --color-story-btn: #53d8a1;
            --color-locked: #c9a84c;
            --font-display: 'Fredoka', sans-serif;
            --font-story: 'Merriweather', Georgia, serif;
        }

        body {
            font-family: var(--font-display);
            background: linear-gradient(135deg, var(--color-bg-start), var(--color-bg-end));
            color: var(--color-text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; padding: 2rem 1rem 0.5rem; }

        .logo-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: clamp(70px, 15vw, 100px);
            height: clamp(70px, 15vw, 100px);
            filter: drop-shadow(0 0 12px rgba(201, 168, 76, 0.4));
        }

        .windmill-blades {
            transform-origin: 60px 60px;
            animation: spin-blades 8s linear infinite;
        }

        @keyframes spin-blades {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .logo-icon:hover .windmill-blades {
            animation-duration: 1.5s;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-personage), var(--color-plek), var(--color-probleem));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px; line-height: 1.2;
        }

        .subtitle { font-size: clamp(0.9rem, 2.5vw, 1.15rem); color: #a0a0b8; margin-top: 0.5rem; font-weight: 400; }

        .ppp-label { display: flex; justify-content: center; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
        .ppp-label span { font-size: 0.85rem; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 20px; letter-spacing: 0.5px; }
        .ppp-label .p1 { background: rgba(233,69,96,0.2); color: var(--color-personage); }
        .ppp-label .p2 { background: rgba(83,216,161,0.2); color: var(--color-plek); }
        .ppp-label .p3 { background: rgba(245,166,35,0.2); color: var(--color-probleem); }

        .age-section { margin-top: 1.25rem; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; width: 100%; max-width: 420px; }
        .age-row { display: flex; align-items: center; gap: 0.6rem; font-size: 1.1rem; font-weight: 500; color: var(--color-text-light); }
        .age-row input {
            width: 64px; text-align: center; font-family: var(--font-display); font-size: 1.15rem; font-weight: 600;
            padding: 0.4rem 0.3rem; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px;
            background: rgba(255,255,255,0.07); color: var(--color-text-light); outline: none;
            transition: border-color 0.3s, box-shadow 0.3s; -moz-appearance: textfield;
        }
        .age-row input::-webkit-inner-spin-button, .age-row input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .age-row input:focus { border-color: var(--color-plek); box-shadow: 0 0 10px rgba(83,216,161,0.25); }
        .age-hint { font-size: 0.8rem; color: #8888a0; text-align: center; min-height: 1.2em; transition: opacity 0.3s; }
        .age-hint.active { color: var(--color-plek); }

        .mode-section { margin-top: 1.25rem; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
        .mode-toggle { display: flex; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12); border-radius: 50px; overflow: hidden; }
        .mode-toggle button {
            font-family: var(--font-display); font-size: 0.9rem; font-weight: 600; padding: 0.5rem 1.4rem;
            border: none; background: none; color: #8888a0; cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        .mode-toggle button.active { background: linear-gradient(135deg, var(--color-machine-border), #e0c565); color: var(--color-text-dark); }
        .mode-toggle button:hover:not(.active) { color: var(--color-text-light); }

        .machine {
            background: var(--color-machine); border: 2px solid var(--color-machine-border); border-radius: 24px;
            padding: 2rem 1.5rem; margin-top: 1rem; width: 100%;
            box-shadow: 0 0 40px rgba(201,168,76,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .reels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .reel { display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
        .reel-header { font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; padding: 0.3rem 0.8rem; border-radius: 8px; }
        .reel:nth-child(1) .reel-header { color: var(--color-personage); background: rgba(233,69,96,0.15); }
        .reel:nth-child(2) .reel-header { color: var(--color-plek); background: rgba(83,216,161,0.15); }
        .reel:nth-child(3) .reel-header { color: var(--color-probleem); background: rgba(245,166,35,0.15); }

        .reel-window {
            width: 100%; height: 120px; background: var(--color-reel-bg); border-radius: 16px;
            display: flex; align-items: center; justify-content: center; padding: 1rem;
            position: relative; overflow: hidden; border: 3px solid #2a2a3e;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .reel-window::before, .reel-window::after { content: ''; position: absolute; left: 0; right: 0; height: 25px; z-index: 2; pointer-events: none; }
        .reel-window::before { top: 0; background: linear-gradient(to bottom, var(--color-reel-bg), transparent); }
        .reel-window::after { bottom: 0; background: linear-gradient(to top, var(--color-reel-bg), transparent); }
        .reel.spinning .reel-window { border-color: #5a5a7e; box-shadow: 0 0 20px rgba(100,100,180,0.3); }
        .reel.locked .reel-window { border-color: var(--color-locked); box-shadow: 0 0 15px rgba(201,168,76,0.25); }

        .reel-value {
            font-size: clamp(0.95rem, 2.2vw, 1.15rem); font-weight: 500; color: var(--color-text-dark);
            text-align: center; line-height: 1.4; transition: transform 0.15s ease-out, opacity 0.15s ease-out; z-index: 1;
        }
        .reel-value.initial { font-size: 2.5rem; color: #c0c0c0; }
        .reel.spinning .reel-value { filter: blur(0.5px); animation: slotPulse 0.12s ease-in-out infinite alternate; }

        @keyframes slotPulse { from { transform: translateY(-3px); opacity: 0.6; } to { transform: translateY(3px); opacity: 0.9; } }
        .reel-value.landed { animation: landBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); filter: none; }
        @keyframes landBounce { 0% { transform: scale(0.9) translateY(5px); opacity: 0.7; } 50% { transform: scale(1.08) translateY(-2px); opacity: 1; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        .lock-btn {
            display: flex; align-items: center; gap: 0.4rem;
            background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.15);
            color: #8888a0; font-family: var(--font-display); font-size: 0.8rem; font-weight: 500;
            padding: 0.4rem 0.9rem; border-radius: 20px; cursor: pointer; transition: all 0.25s; user-select: none;
        }
        .lock-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); color: #b0b0c8; }
        .lock-btn.active { background: rgba(201,168,76,0.15); border-color: var(--color-locked); color: var(--color-locked); }
        .lock-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .lock-icon { font-size: 0.9rem; line-height: 1; }

        .controls { display: flex; justify-content: center; margin-top: 2rem; }
        .spin-btn {
            font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: white;
            background: linear-gradient(135deg, var(--color-spin-start), var(--color-spin-end));
            border: none; border-radius: 50px; padding: 1rem 3.5rem; cursor: pointer;
            letter-spacing: 2px; text-transform: uppercase; transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(233,69,96,0.4); position: relative; overflow: hidden;
        }
        .spin-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent); transform: translateX(-100%); transition: transform 0.5s; }
        .spin-btn:hover:not(:disabled)::after { transform: translateX(100%); }
        .spin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(233,69,96,0.5); }
        .spin-btn:active:not(:disabled) { transform: translateY(0); box-shadow: 0 2px 10px rgba(233,69,96,0.3); }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .hint-section { margin-top: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }
        .hint-btn {
            font-family: var(--font-display); font-size: 1rem; font-weight: 600; color: var(--color-text-dark);
            background: linear-gradient(135deg, var(--color-story-btn), #7de8c0);
            border: none; border-radius: 50px; padding: 0.8rem 2rem; cursor: pointer;
            box-shadow: 0 3px 15px rgba(83,216,161,0.3);
            opacity: 0; transform: translateY(10px); pointer-events: none; transition: all 0.4s ease;
        }
        .hint-btn.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .hint-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(83,216,161,0.4); }

        .hint-output { width: 100%; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1.5rem; display: none; }
        .hint-output.visible { display: block; animation: fadeSlideIn 0.5s ease; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .hint-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #8888a0; margin-bottom: 0.75rem; }
        .hint-text { font-family: var(--font-story); font-size: 1.1rem; line-height: 1.85; color: #d0d0e0; font-style: italic; }

        .item-count { text-align: center; font-size: 0.75rem; color: #5a5a70; margin-top: 0.75rem; }

        
        footer { margin-top: 2.5rem; padding: 1.5rem; text-align: center; color: #5a5a70; font-size: 0.8rem; }

        @media (prefers-reduced-motion: reduce) { .reel.spinning .reel-value { animation: none; filter: none; } .reel-value.landed { animation: none; } }
        @media (max-width: 600px) { .machine { padding: 1.25rem 1rem; border-radius: 18px; } .reels { grid-template-columns: 1fr; gap: 1.25rem; } .reel-window { height: 90px; } .spin-btn { font-size: 1.25rem; padding: 0.85rem 2.5rem; } .controls { margin-top: 1.5rem; } }
        @media (min-width: 601px) and (max-width: 780px) { .reel-value { font-size: 0.9rem; } .reel-window { height: 100px; } }
    </style>
</head>

        <footer><p>De Fantasiemolen &mdash; Combineer Personage, Plek &amp; Probleem en laat je inspireren.</p></footer>

    let currentMode = 'simple';

    function getActiveLists() {
        return currentMode === 'simple'
            ? [personagesSimple, plekkenSimple, problemenSimple]
            : [personages, plekken, problemen];
    }

    // ── DOM ──────────────────────────────────────────────────────────

    const reelEls = [
        document.querySelector('#reel-0 .reel-value'),

    const ageInput = document.getElementById('age-input');
    const ageHint = document.getElementById('age-hint');
    const itemCount = document.getElementById('item-count');

    // ── STATE ────────────────────────────────────────────────────────

    const locked = [false, false, false];
    const currentItems = [null, null, null];
    let isSpinning = false;
    let hasSpun = false;

    // ── HELPERS ──────────────────────────────────────────────────────

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function pickExcluding(arr, excludeText) {
        const f = arr.filter(w => w.text !== excludeText);
        return f.length > 0 ? pick(f) : pick(arr);
    }
    function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    function getAge() {
        const v = parseInt(ageInput.value);
        return (v >= 6 && v <= 99) ? v : null;
    }
    function isTooYoung() {
        const v = parseInt(ageInput.value);
        return v >= 1 && v < 6;
    }
    function getTier(age) {
        if (!age) return 'middle';
        if (age <= 9) return 'young';
        if (age <= 13) return 'middle';
        return 'older';
    }
    function filterByAge(list, age) {
        if (!age) return list;
        return list.filter(item => item.minAge <= age);
    }
    function getFilteredLists() {
        const age = getAge();
        return getActiveLists().map(list => filterByAge(list, age));
    }
    function updateItemCount() {
        const filtered = getFilteredLists();
        const counts = filtered.map(l => l.length);
        itemCount.textContent = `${counts[0]} personages · ${counts[1]} plekken · ${counts[2]} problemen`;
    }

    // ── AGE ─────────────────────────────────────────────────────────

    function updateAgeHint() {
        const age = getAge();
        if (isTooYoung()) {
            ageHint.textContent = 'De laagste leeftijd is 6 jaar';
            ageHint.classList.add('active');
            spinBtn.disabled = true;
        } else if (!age) {
            spinBtn.disabled = false;
            ageHint.textContent = 'Vul je leeftijd in voor verhalen op maat';
            ageHint.classList.remove('active');
        } else {
            spinBtn.disabled = false;
            const msgs = { young: 'Super! De Fantasiemolen draait verhalen speciaal voor jou!', middle: 'Top! Klaar voor spannende verhalen!', older: 'Welkom, schrijver! De machine staat klaar.' };
            ageHint.textContent = msgs[getTier(age)];
            ageHint.classList.add('active');
        }
        updateItemCount();
    }
    ageInput.addEventListener('input', updateAgeHint);
    updateAgeHint();

    // ── MODE TOGGLE ──────────────────────────────────────────────────

    const modeSimpleBtn = document.getElementById('mode-simple');
    const modeFantasyBtn = document.getElementById('mode-fantasy');

    function setMode(mode) {
        currentMode = mode;
        modeSimpleBtn.classList.toggle('active', mode === 'simple');
        modeFantasyBtn.classList.toggle('active', mode === 'fantasy');
        locked.fill(false);
        currentItems.fill(null);
        hasSpun = false;
        reelEls.forEach(el => { el.textContent = '?'; el.classList.add('initial'); el.classList.remove('landed'); });
        reelContainers.forEach(c => c.classList.remove('locked'));
        lockButtons.forEach(btn => { btn.disabled = true; btn.classList.remove('active'); btn.querySelector('.lock-icon').textContent = '\u{1F513}'; btn.querySelector('.lock-text').textContent = 'Vastzetten'; });
        hintBtn.classList.remove('visible');
        hintOutput.classList.remove('visible');
        updateItemCount();
    }
    modeSimpleBtn.addEventListener('click', () => setMode('simple'));
    modeFantasyBtn.addEventListener('click', () => setMode('fantasy'));

    // ── LOCKS ────────────────────────────────────────────────────────

    lockButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            if (isSpinning || !hasSpun) return;
            const idx = parseInt(btn.dataset.reel);
            locked[idx] = !locked[idx];
            btn.classList.toggle('active', locked[idx]);
            btn.querySelector('.lock-icon').textContent = locked[idx] ? '\u{1F512}' : '\u{1F513}';
            btn.querySelector('.lock-text').textContent = locked[idx] ? 'Vastzit' : 'Vastzetten';
            reelContainers[idx].classList.toggle('locked', locked[idx]);
        });
    });

    // ── SPIN ─────────────────────────────────────────────────────────

    function spinReel(index, filteredList) {
        return new Promise(resolve => {
            const el = reelEls[index];
            const container = reelContainers[index];
            const currentText = currentItems[index] ? currentItems[index].text : null;
            const target = pickExcluding(filteredList, currentText);
            container.classList.add('spinning');
            el.classList.remove('initial', 'landed');
            let interval = 55, elapsed = 0;
            const duration = 1600 + index * 450;
            function tick() {
                el.textContent = cap(pick(filteredList).text);
                elapsed += interval;
                if (elapsed >= duration) {
                    el.textContent = cap(target.text);
                    container.classList.remove('spinning');
                    el.classList.add('landed');
                    currentItems[index] = target;
                    resolve();
                    return;
                }
                const progress = elapsed / duration;
                interval = 55 + (progress * progress * progress) * 350;
                setTimeout(tick, interval);
            }
            setTimeout(tick, 50);
        });
    }

    async function spin() {
        if (isSpinning) return;
        if (isTooYoung()) return;
        if (locked.every(Boolean) && hasSpun) return;
        isSpinning = true;
        spinBtn.disabled = true;
        hintBtn.classList.remove('visible');
        hintOutput.classList.remove('visible');
        lockButtons.forEach(btn => { btn.disabled = true; });
        const filtered = getFilteredLists();
        const promises = [];
        for (let i = 0; i < 3; i++) {
            if (!locked[i]) promises.push(spinReel(i, filtered[i]));
        }
        await Promise.all(promises);
        isSpinning = false;
        hasSpun = true;
        spinBtn.disabled = false;
        lockButtons.forEach(btn => { btn.disabled = false; });
        hintBtn.classList.add('visible');
    }
    spinBtn.addEventListener('click', spin);

    function pickHint() {
        let idx;
        do { idx = Math.floor(Math.random() * hulpvragen.length); } while (idx === lastHintIndex);

        return hulpvragen[idx];
